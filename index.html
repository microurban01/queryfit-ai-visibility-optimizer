<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QueryFit | AI Visibility Optimizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            400: '#a78bfa',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                        },
                        accent: {
                            400: '#34d399',
                        },
                        background: 'hsl(var(--background))',
                        foreground: 'hsl(var(--foreground))',
                        card: 'hsl(var(--card))',
                        border: 'hsl(var(--border))',
                        muted: 'hsl(var(--muted))',
                        'muted-foreground': 'hsl(var(--muted-foreground))',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'monospace'],
                    },
                    boxShadow: {
                        'soft': '0 10px 30px -10px rgba(0, 0, 0, 0.5)',
                        'glow': '0 0 20px -5px rgba(167, 139, 250, 0.3)',
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            /* Light Mode Defaults */
            --background: 240 5% 98%;
            --foreground: 240 10% 3.9%;
            --card: 0 0% 100%;
            --border: 240 5.9% 90%;
            --muted: 240 4.8% 95.9%;
            --muted-foreground: 240 3.8% 45%;
        }

        .dark {
            /* Dark Mode Overrides (Deep Amethyst) */
            --background: 240 10% 3.9%;
            --foreground: 0 0% 98%;
            --card: 240 10% 5.5%;
            --border: 240 5% 12%;
            --muted: 240 5% 8%;
            --muted-foreground: 240 5% 65%;
        }

        body { 
            font-family: 'Inter', sans-serif;
            background-color: hsl(var(--background));
            color: hsl(var(--foreground));
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .bg-aurora {
            background: radial-gradient(circle at 100% 0%, rgba(167, 139, 250, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 0% 100%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { 
            background: rgba(156, 163, 175, 0.2); 
            border-radius: 10px; 
        }
        ::-webkit-scrollbar-thumb:hover { background: rgba(156, 163, 175, 0.4); }

        .page-transition {
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
    "react-dom": "https://esm.sh/react-dom@18.2.0",
    "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
    "lucide-react": "https://esm.sh/lucide-react@0.344.0?external=react",
    "recharts": "https://esm.sh/recharts@2.12.3?external=react,react-dom",
    "clsx": "https://esm.sh/clsx@2.1.0",
    "tailwind-merge": "https://esm.sh/tailwind-merge@2.2.1",
    "prop-types": "https://esm.sh/prop-types@15.8.1",
    "react-is": "https://esm.sh/react-is@18.2.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/"
  }
}
</script>
<script>
  window.addEventListener('error', function(event) {
    console.error(event.error);
    const root = document.getElementById('root');
    // If root is empty, it means React hasn't rendered anything yet.
    if(root && !root.hasChildNodes()) {
        const errorDiv = document.createElement('div');
        errorDiv.style.position = 'fixed';
        errorDiv.style.top = '0';
        errorDiv.style.left = '0';
        errorDiv.style.width = '100%';
        errorDiv.style.padding = '40px';
        errorDiv.style.color = '#ff6b6b';
        errorDiv.style.backgroundColor = '#1a1a1a';
        errorDiv.style.fontFamily = 'monospace';
        errorDiv.style.zIndex = '9999';
        errorDiv.innerHTML = '<h2 style="margin-bottom:10px">Startup Error</h2><pre style="white-space:pre-wrap;">' + (event.message || event.error) + '</pre>';
        document.body.appendChild(errorDiv);
    }
  });
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="overflow-hidden">
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
